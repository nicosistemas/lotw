<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LoTW Loader</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            text-align: center;
            padding: 40px;
        }
        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
            width: 420px;
        }
        h1 {
            margin-bottom: 20px;
        }
        input, button {
            margin: 10px 0;
            padding: 10px;
            width: 90%;
            border-radius: 5px;
            border: none;
        }
        input {
            background: #020617;
            color: #e2e8f0;
        }
        button {
            background: #22c55e;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #16a34a;
        }
        .msg {
            margin-top: 15px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>📡 LoTW Loader</h1>

    <form action="/upload" method="POST" enctype="multipart/form-data">
        
        <input 
            type="text" 
            name="operator" 
            placeholder="Indicativo (ej: LU2FTI)" 
            required
        >

        <input 
            type="file" 
            name="adif" 
            accept=".adi,.adif" 
            required
        >

        <button type="submit">Procesar y Descargar</button>
    </form>

    <div class="msg">
        Subí un archivo ADIF y se normaliza automáticamente para LoTW.
    </div>
</div>

</body>
</html>
